# ============================================================
# Smart Hostel Complaint System - Nagios Monitoring Config
# ============================================================

define host {
    use                     linux-server
    host_name               hostel-app
    alias                   Smart Hostel Complaint System
    address                 127.0.0.1
    max_check_attempts      3
    check_period            24x7
    notification_interval   60
    notification_period     24x7
}

define service {
    use                     generic-service
    host_name               hostel-app
    service_description     Host Alive Ping
    check_command           check_ping!100.0,20%!500.0,60%
}

define service {
    use                     generic-service
    host_name               hostel-app
    service_description     Backend API Port 8080
    check_command           check_tcp!8080
}

define service {
    use                     generic-service
    host_name               hostel-app
    service_description     Frontend Port 3000
    check_command           check_tcp!3000
}

define service {
    use                     generic-service
    host_name               hostel-app
    service_description     MySQL Database Port 3306
    check_command           check_tcp!3306
}

define service {
    use                     generic-service
    host_name               hostel-app
    service_description     HTTP Response Check
    check_command           check_http!-p 3000
}
